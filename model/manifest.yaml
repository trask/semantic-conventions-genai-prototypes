name: semantic-conventions-genai
description: >
  OpenTelemetry Semantic Conventions for Generative AI.
  This registry defines semantic conventions for GenAI, including
  LLM inference, agents, tool calling, embeddings, and the
  Model Context Protocol (MCP).
schema_url: https://opentelemetry.io/schemas/gen-ai/0.1.0
dependencies:
  # NOTE: This is a local filtered copy of
  # https://github.com/open-telemetry/semantic-conventions.git@v1.40.0[model]
  # with the gen-ai/, mcp/, and openai/ subdirectories removed. This repo is
  # the canonical home for those conventions going forward; until upstream
  # deletes its copies we strip them here so Weaver does not see the same
  # group ids defined in two places. The Makefile target that produces
  # `.build/sc-upstream-filtered` is invoked automatically by `check` and
  # `generate-docs`.
  - name: otel
    registry_path: ./.build/sc-upstream-filtered
