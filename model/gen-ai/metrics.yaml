file_format: definition/2
attribute_groups:
  - id: metric_attributes.gen_ai
    visibility: public
    brief: 'This group describes GenAI metrics attributes'
    stability: development
    attributes:
      - ref: server.address
        brief: GenAI server address.
        requirement_level: recommended
      - ref: server.port
        brief: GenAI server port.
        requirement_level:
          conditionally_required: If `server.address` is set.
      - ref: gen_ai.response.model
        requirement_level: recommended
      - ref: gen_ai.request.model
        requirement_level:
          conditionally_required: If available.
      - ref: gen_ai.provider.name
        requirement_level: required
      - ref: gen_ai.operation.name
        requirement_level: required
  - id: metric_attributes.gen_ai.server
    visibility: public
    brief: 'This group describes GenAI server metrics attributes'
    stability: development
    attributes:
      - ref_group: metric_attributes.gen_ai
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"
        note: |
          The `error.type` SHOULD match the error code returned by the Generative AI service,
          the canonical name of exception that occurred, or another low-cardinality error identifier.
          Instrumentations SHOULD document the list of errors they report.
  - id: metric_attributes.openai
    visibility: public
    brief: 'This group describes GenAI server metrics attributes'
    stability: development
    attributes:
      - ref: openai.response.service_tier
        requirement_level: recommended
      - ref: openai.response.system_fingerprint
        requirement_level: recommended
metrics:
  - name: gen_ai.client.token.usage
    instrument: histogram
    unit: "{token}"
    brief: 'Number of input and output tokens used.'
    stability: development
    annotations:
      code_generation:
        metric_value_type: int
    attributes:
      - ref_group: metric_attributes.gen_ai
      - ref: gen_ai.token.type
        requirement_level: required
  - name: gen_ai.client.operation.duration
    instrument: histogram
    unit: "s"
    brief: 'GenAI operation duration.'
    stability: development
    annotations:
      code_generation:
        metric_value_type: double
    attributes:
      - ref_group: metric_attributes.gen_ai
      - ref: error.type
        requirement_level:
          conditionally_required: "if the operation ended in an error"
        note: |
          The `error.type` SHOULD match the error code returned by the Generative AI provider or the client library,
          the canonical name of exception that occurred, or another low-cardinality error identifier.
          Instrumentations SHOULD document the list of errors they report.
  - name: gen_ai.client.operation.time_to_first_chunk
    instrument: histogram
    unit: "s"
    brief: 'Time to receive the first chunk, measured from when the client issues the generation request to when the first chunk is received in the response stream.'
    note: >
      This metrics SHOULD be reported for streaming calls and SHOULD NOT be reported otherwise.
    stability: development
    annotations:
      code_generation:
        metric_value_type: double
    attributes:
      - ref_group: metric_attributes.gen_ai
  - name: gen_ai.client.operation.time_per_output_chunk
    instrument: histogram
    unit: "s"
    brief: >
      Time per output chunk, recorded for each chunk received after the first one, measured as the time elapsed from the end of the previous chunk to the end of the current chunk.
    note: >
      This metrics SHOULD be reported for streaming calls and SHOULD NOT be reported otherwise.
    stability: development
    annotations:
      code_generation:
        metric_value_type: double
    attributes:
      - ref_group: metric_attributes.gen_ai
  - name: gen_ai.server.request.duration
    instrument: histogram
    unit: "s"
    brief: 'Generative AI server request duration such as time-to-last byte or last output token.'
    stability: development
    annotations:
      code_generation:
        metric_value_type: double
    attributes:
      - ref_group: metric_attributes.gen_ai.server
  - name: gen_ai.server.time_per_output_token
    instrument: histogram
    unit: "s"
    brief: 'Time per output token generated after the first token for successful responses.'
    stability: development
    annotations:
      code_generation:
        metric_value_type: double
    attributes:
      - ref_group: metric_attributes.gen_ai
  - name: gen_ai.server.time_to_first_token
    instrument: histogram
    unit: "s"
    brief: 'Time to generate first token for successful responses.'
    stability: development
    annotations:
      code_generation:
        metric_value_type: double
    attributes:
      - ref_group: metric_attributes.gen_ai
