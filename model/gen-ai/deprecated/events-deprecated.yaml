file_format: definition/2
attribute_groups:
  - id: gen_ai.deprecated.event.attributes
    visibility: public
    brief: >
      Describes common Gen AI event attributes.
    stability: development
    attributes:
      - ref: gen_ai.system

events:
  - name: gen_ai.system.message
    brief: >
      This event describes the system instructions passed to the GenAI model.
    stability: development
    deprecated:
      reason: uncategorized
      note: >
        Chat history is reported on `gen_ai.system_instructions` attribute on
        spans or `gen_ai.client.inference.operation.details` event.
    attributes:
      - ref_group: gen_ai.common.event.attributes
  - name: gen_ai.user.message
    brief: >
      This event describes the user message passed to the GenAI model.
    stability: development
    deprecated:
      reason: uncategorized
      note: >
        Chat history is reported on `gen_ai.input.messages` attribute on spans
        or `gen_ai.client.inference.operation.details` event.
    attributes:
      - ref_group: gen_ai.common.event.attributes
  - name: gen_ai.assistant.message
    brief: >
      This event describes the assistant message passed to GenAI system.
    stability: development
    deprecated:
      reason: uncategorized
      note: >
        Chat history is reported on `gen_ai.input.messages` attribute on spans
        or `gen_ai.client.inference.operation.details` event.
    attributes:
      - ref_group: gen_ai.common.event.attributes
  - name: gen_ai.tool.message
    brief: >
      This event describes the response from a tool or function call passed to the GenAI model.
    stability: development
    deprecated:
      reason: uncategorized
      note: >
        Chat history is reported on `gen_ai.input.messages` attribute on spans
        or `gen_ai.client.inference.operation.details` event.
    attributes:
      - ref_group: gen_ai.common.event.attributes
  - name: gen_ai.choice
    brief: >
      This event describes the Gen AI response message.
    stability: development
    deprecated:
      reason: uncategorized
      note: >
        Chat history is reported on `gen_ai.output.messages` attribute on spans
        or `gen_ai.client.inference.operation.details` event.
    attributes:
      - ref_group: gen_ai.common.event.attributes
