name: Check Model
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load shared version pins
        id: versions
        uses: ./.github/actions/load-version-pins

      - name: Install Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@f8e1b42fbd1e09df5263c26b7df6011eaafd454d
        with:
          version: '${{ steps.versions.outputs.weaver_version }}'

      - name: Validate model
        run: make check-policies

  check-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Load shared version pins
        id: versions
        uses: ./.github/actions/load-version-pins

      - name: Install Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@f8e1b42fbd1e09df5263c26b7df6011eaafd454d
        with:
          version: '${{ steps.versions.outputs.weaver_version }}'

      - name: Check generated docs are in sync
        run: |
          make generate-docs
          if ! git diff --exit-code -- ./docs/registry; then
            echo "FAIL: Generated registry documentation is out of sync!"
            echo "Run 'make generate-docs' and commit the changes."
            exit 1
          fi
          echo "OK: Deterministic generated documentation is up to date"
