name: Prepare Release

# Manually-triggered release prep. Bumps schema_url in model/manifest.yaml,
# rolls CHANGELOG.md (turns the Unreleased block into a dated section and
# prepends a fresh empty one), regenerates docs so the new schema_url shows
# up in the registry pages, and opens a PR against main.
#
# After the PR merges, push tag v<version> to trigger the release workflow.
#
# Auth model:
#   - The branch is pushed using the default GITHUB_TOKEN (the otelbot
#     GitHub App only has pull_requests:write, not contents:write, so it
#     cannot push branches).
#   - The PR itself is opened using an otelbot app token. PRs opened by
#     GITHUB_TOKEN do not trigger downstream workflows; PRs opened by
#     otelbot do, so check.yml + ci.yml run automatically on the release
#     PR. Commits are authored as otelbot so they pass EasyCLA.
#   - Branch is named `otelbot/prepare-release-v<version>` per the
#     recommended otelbot branch convention.
# See https://github.com/open-telemetry/community/blob/main/assets.md#otelbot

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version, e.g. 1.43.0 (no leading 'v')."
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate inputs
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must be MAJOR.MINOR.PATCH (no leading 'v'); got '${{ inputs.version }}'"
            exit 1
          fi

      - name: Load shared version pins
        id: versions
        uses: ./.github/actions/load-version-pins

      - name: Install Weaver
        uses: open-telemetry/weaver/.github/actions/setup-weaver@f8e1b42fbd1e09df5263c26b7df6011eaafd454d
        with:
          version: '${{ steps.versions.outputs.weaver_version }}'

      - uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Bump manifest + roll CHANGELOG
        run: |
          uv run --no-project .github/scripts/prepare_release.py --version "${{ inputs.version }}"

      - name: Regenerate docs
        run: make generate-docs

      - name: Show pending diff
        run: git --no-pager diff --stat && git --no-pager diff

      - name: Generate otelbot app token
        id: app-token
        uses: actions/create-github-app-token@a8d616148505b5069dccd32f177bb87d7f39123b # v2.1.4
        with:
          app-id: ${{ vars.OTELBOT_APP_ID }}
          private-key: ${{ secrets.OTELBOT_PRIVATE_KEY }}

      - name: Open release PR
        env:
          # actions/checkout already configured the local repo to push as
          # GITHUB_TOKEN (which has contents:write). gh reads GH_TOKEN, so
          # we point that at the otelbot app token: PRs opened by otelbot
          # trigger downstream workflows; PRs opened by GITHUB_TOKEN do
          # not.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          branch="otelbot/prepare-release-v${VERSION}"
          # otelbot is on the EasyCLA allowlist.
          git config user.name otelbot
          git config user.email 197425009+otelbot@users.noreply.github.com
          git checkout -b "$branch"
          git add -A
          if git diff --cached --quiet; then
            echo "::error::No changes produced by prepare_release.py + generate-docs"
            exit 1
          fi
          git commit -m "Prepare release v${VERSION}"
          git push --set-upstream origin "$branch"

          body=$(cat <<EOF
          Prepared by the \`prepare-release\` workflow.

          - Bumps \`schema_url\` in \`model/manifest.yaml\` to \`${VERSION}\`.
          - Rolls the \`Unreleased\` section in \`CHANGELOG.md\` to \`v${VERSION}\`.
          - Regenerates \`docs/registry/\`.

          After merging, push tag \`v${VERSION}\` to trigger the \`release\` workflow.
          EOF
          )
          gh pr create \
            --base main \
            --head "$branch" \
            --title "Prepare release v${VERSION}" \
            --body "$body"
